<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VG TV</title>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='80' height='60' x='10' y='20' fill='red' rx='10'/><polygon fill='white' points='40,35 40,65 65,50'/></svg>">
<style>
:root{--b:linear-gradient(135deg,#ffe6e6,#ffb3b3);--c:#fff;--t:#333;--m:#800000;--a:#cc0000;--h:#ffcccc}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:var(--b);background-attachment:fixed;color:var(--m)}
.nav{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:#fff9;backdrop-filter:blur(10px);position:sticky;top:0;z-index:99}
.nav-l{display:flex;align-items:center;gap:10px}
.nav-l h1{color:var(--a);font-size:1.8em;text-transform:uppercase}
.nav-r{display:flex;gap:10px}
select,input{padding:10px;border:2px solid var(--a);border-radius:8px;outline:0;background:var(--c);color:var(--t)}
select{color:var(--a);font-weight:600}
#gv{min-height:100vh}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:20px;max-width:1200px;margin:20px auto;padding:0 20px}
.card{background:var(--c);color:var(--t);border-radius:12px;padding:15px;cursor:pointer;text-align:center;box-shadow:0 4px 6px rgba(204,0,0,.1);transition:.2s}
.card:hover{transform:translateY(-5px);background:var(--h)}
.card img{width:80px;height:80px;object-fit:contain;margin-bottom:10px;background:#1e1e1e;border-radius:8px;padding:5px}
.card .t{font-size:.95em;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
#p{display:none;position:fixed;inset:0;background:#000;align-items:center;justify-content:center}
video{width:100%;height:100%;object-fit:contain;background:#000}
@media(max-width:650px){.nav{flex-direction:column;gap:15px}.nav-r{width:100%}input{flex-grow:1}}
</style>
</head>
<body>

<div id="gv">
    <header class="nav">
        <div class="nav-l">
            <svg width="35" height="35" viewBox="0 0 100 100"><rect width="90" height="70" x="5" y="15" fill="#c00" rx="12"/><polygon fill="#fff" points="40,35 40,65 65,50"/></svg>
            <h1>VG TV</h1>
        </div>
        <div class="nav-r">
            <select id="cat"></select>
            <input type="text" id="src" placeholder="Search channels...">
        </div>
    </header>
    <div id="ld" style="text-align:center;margin:50px;font-weight:bold;font-size:1.2em">Loading channels...</div>
    <div id="g" class="grid"></div>
</div>

<div id="p"><video id="v" autoplay muted playsinline></video></div>

<script>
let ch=[];
const P=new URLSearchParams(location.search), U=P.get('url'), N=P.get('name');

if(U){
    document.title=N;
    document.getElementById('gv').style.display='none';
    document.getElementById('p').style.display='flex';
    initP(U);
}else{
    initG();
}

async function initG(){
    try {
        const r=await fetch('https://iptv-org.github.io/iptv/languages/hin.m3u');
        const d=(await r.text()).split('\n');
        let c={};
        
        d.forEach(l=>{
            l=l.trim();
            if(l.startsWith('#EXTINF:')){
                c.l=(l.match(/tvg-logo="([^"]+)"/)||[])[1]||'';
                c.g=(l.match(/group-title="([^"]+)"/)||[])[1]||'Other';
                c.n=l.split(',').pop().trim();
            }else if(l&&!l.startsWith('#')){
                c.u=l; ch.push({...c}); c={};
            }
        });
        
        document.getElementById('ld').style.display='none';
        
        const cg={'All Categories':ch.length};
        ch.forEach(x=>cg[x.g]=(cg[x.g]||0)+1);
        
        const dd=document.getElementById('cat');
        ['All Categories',...Object.keys(cg).filter(k=>k!=='All Categories').sort()].forEach(k=>{
            dd.innerHTML+=`<option value="${k}">${k} (${cg[k]})</option>`;
        });

        dd.onchange=document.getElementById('src').oninput=draw;
        draw();
    } catch(e) { document.getElementById('ld').innerText='Error loading playlist'; }
}

function draw(){
    const s=document.getElementById('src').value.toLowerCase(), g=document.getElementById('cat').value;
    document.getElementById('g').innerHTML=ch.filter(x=>(g==='All Categories'||x.g===g)&&x.n.toLowerCase().includes(s))
        .map(x=>`<div class="card" onclick="window.open('?url=${encodeURIComponent(x.u)}&name=${encodeURIComponent(x.n)}','_blank')">
            <img src="${x.l}" onerror="this.src='https://via.placeholder.com/80x80.png?text=No+Logo'" loading="lazy">
            <div class="t">${x.n}</div></div>`).join('')||'<p style="grid-column:1/-1;text-align:center;font-weight:bold">No channels found.</p>';
}

async function initP(u){
    shaka.polyfill.installAll();
    const v=document.getElementById("v"), p=new shaka.Player(), ui=new shaka.ui.Overlay(p,document.getElementById("p"),v);
    await p.attach(v);
    ui.configure({addBigPlayButton:!0,addSeekBar:!1,controlPanelElements:['play_pause','time_and_duration','mute','volume','spacer','language','captions','picture_in_picture','quality','fullscreen']});
    p.configure({manifest:{defaultPresentationDelay:5},streaming:{lowLatencyMode:!0,bufferingGoal:10,rebufferingGoal:2,safeSeekOffset:5}});
    await p.load(u);
    v.onplay=()=>v.muted=true;
    v.play().catch(()=>{});
}
</script>
</body>
</html>
