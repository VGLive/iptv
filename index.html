<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css"/>
    <link rel="icon" href="https://i.postimg.cc/bvcWFCz1/iptv.png">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ffe6e6 0%, #ffb3b3 100%); 
            --card-bg: #ffffff;  
            --card-text: #333333; 
            --main-text: #800000; 
            --accent-red: #cc0000; 
            --hover-red: #ffcccc; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg-gradient) fixed; color: var(--main-text); }
        
        /* Adjusted padding to let the logo cover more space */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0 2px 10px rgba(204, 0, 0, 0.15); position: sticky; top: 0; z-index: 100; }
        
        .nav-left { display: flex; align-items: center; }
        
        /* Greatly increased logo size for web */
        .logo-icon { height: 80px; width: auto; min-width: 150px; object-fit: contain; border-radius: 6px; }
        
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .cat-dropdown, .search-box { height: 42px; padding: 8px 15px; border: 2px solid var(--accent-red); border-radius: 8px; font-size: 0.95em; color: var(--card-text); background-color: var(--card-bg); outline: none; transition: box-shadow 0.2s; }
        .cat-dropdown { font-weight: 600; color: var(--accent-red); cursor: pointer; }
        .cat-dropdown:focus, .search-box:focus { box-shadow: 0 0 8px rgba(204, 0, 0, 0.4); }
        .search-box { width: 220px; }
        
        /* Mobile Optimization */
        @media (max-width: 768px) {
            .top-nav { flex-direction: column; gap: 15px; padding: 12px 15px; }
            .nav-left { width: 100%; justify-content: center; }
            /* Logo covers the full width/header area in mobile */
            .logo-icon { width: 100%; height: 85px; }
            
            .nav-right { width: 100%; flex-direction: row; gap: 10px; }
            .cat-dropdown, .search-box { flex: 1; min-width: 0; width: 50%; padding: 8px 10px; font-size: 0.85em; }
        }

        #grid-view { min-height: 100vh; }
        .grid-container { padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .card { background-color: var(--card-bg); color: var(--card-text); border-radius: 12px; box-shadow: 0 4px 6px rgba(204,0,0,0.1); padding: 12px; cursor: pointer; transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .card:hover { transform: translateY(-4px); background-color: var(--hover-red); box-shadow: 0 8px 15px rgba(204,0,0,0.2); }
        .card img { width: 70px; height: 70px; object-fit: contain; margin-bottom: 10px; background: #1e1e1e; border-radius: 8px; padding: 5px; }
        .card .title { font-size: 0.9em; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; font-weight: 600; }
        .loader { text-align: center; font-size: 1.2em; margin-top: 50px; font-weight: bold; }
        #player-view { display: none; position: fixed; inset: 0; background: #000; align-items: center; justify-content: center; z-index: 1000; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    </style>
</head>
<body>
    <div id="grid-view">
        <header class="top-nav">
            <div class="nav-left"><img class="logo-icon" src="https://i.postimg.cc/bvcWFCz1/iptv.png" alt="Logo"></div>
            <div class="nav-right">
                <select id="categoryDropdown" class="cat-dropdown"></select>
                <input type="text" id="searchInput" class="search-box" placeholder="Search channels...">
            </div>
        </header>
        <div id="loading" class="loader">Loading channels...</div>
        <div class="grid-container"><div class="grid" id="channelGrid"></div></div>
    </div>
    <div id="player-view" class="shaka-video-container">
        <video id="v" autoplay muted playsinline preload="metadata"></video>
    </div>
    <script>
        const PLAYLIST_URL = 'https://iptv-org.github.io/iptv/languages/hin.m3u';
        let allChannels = []; 
        const params = new URLSearchParams(window.location.search);
        const streamUrl = params.get('url'), channelName = params.get('name');

        if (streamUrl) {
            document.getElementById('grid-view').style.display = 'none';
            document.getElementById('player-view').style.display = 'flex';
            if (channelName) document.title = channelName;
            initPlayer(streamUrl);
        } else {
            initGrid();
        }

        async function initGrid() {
            try {
                const res = await fetch(PLAYLIST_URL);
                allChannels = parseM3U(await res.text());
                document.getElementById('loading').style.display = 'none';
                renderDropdown();
                filterChannels();
                document.getElementById('categoryDropdown').addEventListener('change', filterChannels);
                document.getElementById('searchInput').addEventListener('input', filterChannels);
            } catch (e) {
                document.getElementById('loading').innerText = 'Error loading playlist.';
            }
        }

        function parseM3U(data) {
            const channels = [];
            let curr = {};
            data.split('\n').forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    curr.logo = (line.match(/tvg-logo="([^"]+)"/) || [])[1] || 'https://via.placeholder.com/80x80.png?text=No+Logo';
                    curr.group = (line.match(/group-title="([^"]+)"/) || [])[1] || 'Other';
                    curr.name = line.split(',').pop().trim() || 'Unknown';
                } else if (line && !line.startsWith('#') && line.startsWith('https://')) {
                    curr.url = line;
                    channels.push({...curr});
                    curr = {}; 
                }
            });
            return channels;
        }

        function renderDropdown() {
            const dd = document.getElementById('categoryDropdown');
            const counts = { 'All Categories': allChannels.length };
            allChannels.forEach(c => counts[c.group] = (counts[c.group] || 0) + 1);
            ['All Categories', ...Object.keys(counts).filter(k => k !== 'All Categories').sort()].forEach(cat => {
                dd.appendChild(new Option(`${cat} (${counts[cat]})`, cat));
            });
        }

        function filterChannels() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.getElementById('categoryDropdown').value;
            const grid = document.getElementById('channelGrid');
            grid.innerHTML = ''; 
            
            const filtered = allChannels.filter(c => (cat === 'All Categories' || c.group === cat) && c.name.toLowerCase().includes(term));
            
            if (!filtered.length) return grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;font-weight:bold;">No channels found.</p>';

            filtered.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${c.logo}" alt="${c.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/80x80.png?text=No+Logo'"><div class="title">${c.name}</div>`;
                card.onclick = () => window.open(`${window.location.pathname}?url=${encodeURIComponent(c.url)}&name=${encodeURIComponent(c.name)}`, '_blank');
                grid.appendChild(card);
            });
        }

        async function initPlayer(url) {
            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) return alert("Browser not supported!");
            
            const v = document.getElementById("v");
            const p = new shaka.Player();
            const ui = new shaka.ui.Overlay(p, document.getElementById("player-view"), v);
            await p.attach(v);
            
            ui.configure({
                addBigPlayButton: true, addSeekBar: false,
                controlPanelElements: ['play_pause','time_and_duration','mute','volume','spacer','fullscreen','overflow_menu'],
                seekBarColors: { base: 'white', buffered: 'red', played: 'green' }
            });
            p.configure({ manifest: { defaultPresentationDelay: 5 }, streaming: { lowLatencyMode: true, bufferingGoal: 10, rebufferingGoal: 2, safeSeekOffset: 5 } });
            
            p.load(url).then(() => v.play().catch(()=>{})).catch(()=>{});
            v.addEventListener("play", () => v.muted = false, { once: true });
        }
    </script>
</body>
</html>
