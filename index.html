<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV One</title>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css"/>
    <link rel="icon" type="image/png" sizes="16x16" href="https://i.postimg.cc/02hBbWKp/IP.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #ffe6e6; color: #800000; }
        .top-nav { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; padding: 10px 20px; background: #fff; position: sticky; top: 0; z-index: 100; gap: 10px; }
        .top-nav div { display: flex; gap: 10px; align-items: center; width: 100%; flex: 1; min-width: 250px; }
        .logo-icon { height: 50px; }
        .cat-dropdown, .search-box { padding: 6px; border: 1px solid #cc0000; border-radius: 5px; outline: none; width: 100%; }
        .cat-dropdown { font-weight: bold; color: #cc0000; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #fff; border-radius: 8px; padding: 10px; cursor: pointer; text-align: center; }
        .card:hover { background: #ffcccc; }
        .card img { width: 100%; height: 70px; object-fit: contain; margin-bottom: 5px; }
        .card .title { font-size: 0.9em; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .loader { text-align: center; margin-top: 50px; font-weight: bold; }
        #player-view { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="grid-view">
        <header class="top-nav">
            <div><img class="logo-icon" src="https://i.postimg.cc/bvcWFCz1/iptv.png" alt="Logo"></div>
            <div style="justify-content: flex-end;">
                <select id="categoryDropdown" class="cat-dropdown"></select>
                <input type="text" id="searchInput" class="search-box" placeholder="Search channels...">
            </div>
        </header>
        <div id="loading" class="loader">Loading channels...</div>
        <div class="grid" id="channelGrid"></div>
    </div>
    
    <div id="player-view">
        <video id="v" autoplay playsinline preload="metadata"></video>
    </div>

    <script>
        let allChannels = []; 
        const streamUrl = new URLSearchParams(window.location.search).get('url');

        if (streamUrl) {
            document.getElementById('grid-view').style.display = 'none';
            document.getElementById('player-view').style.display = 'block';
            initPlayer(streamUrl);
        } else {
            initGrid();
        }

        async function initGrid() {
            try {
                const res = await fetch('https://iptv-org.github.io/iptv/languages/hin.m3u');
                const data = await res.text();
                
                let curr = {};
                data.split('\n').forEach(line => {
                    line = line.trim();
                    if (line.startsWith('#EXTINF:')) {
                        curr.logo = (line.match(/tvg-logo="([^"]+)"/) || [])[1] || 'https://via.placeholder.com/80x80.png?text=No+Logo';
                        curr.group = (line.match(/group-title="([^"]+)"/) || [])[1] || 'Other';
                        curr.name = line.split(',').pop().trim() || 'Unknown';
                    } else if (line && !line.startsWith('#') && line.startsWith('https://')) {
                        allChannels.push({...curr, url: line});
                        curr = {}; 
                    }
                });

                document.getElementById('loading').style.display = 'none';
                
                const dd = document.getElementById('categoryDropdown');
                const counts = { 'All Categories': allChannels.length };
                allChannels.forEach(c => counts[c.group] = (counts[c.group] || 0) + 1);
                
                ['All Categories', ...Object.keys(counts).filter(k => k !== 'All Categories').sort()].forEach(cat => {
                    dd.appendChild(new Option(`${cat} (${counts[cat]})`, cat));
                });

                filterChannels();
                dd.addEventListener('change', filterChannels);
                document.getElementById('searchInput').addEventListener('input', filterChannels);
            } catch (e) {
                document.getElementById('loading').innerText = 'Error loading playlist.';
            }
        }

        function filterChannels() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.getElementById('categoryDropdown').value;
            const grid = document.getElementById('channelGrid');
            grid.innerHTML = ''; 
            
            const filtered = allChannels.filter(c => (cat === 'All Categories' || c.group === cat) && c.name.toLowerCase().includes(term));
            
            if (!filtered.length) return grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;font-weight:bold;">No channels found.</p>';

            filtered.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${c.logo}" alt="${c.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/80x80.png?text=No+Logo'"><div class="title">${c.name}</div>`;
                card.onclick = () => window.open(`https://iptvone.pages.dev/?url=${c.url}`, '_blank');
                grid.appendChild(card);
            });
        }

        async function initPlayer(url) {
            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) return alert("Browser not supported!");
            
            const v = document.getElementById("v");
            const p = new shaka.Player();
            const ui = new shaka.ui.Overlay(p, document.getElementById("player-view"), v);
            await p.attach(v);
            
            ui.configure({
                addBigPlayButton: true, addSeekBar: false,
                controlPanelElements: ['play_pause','time_and_duration','mute','volume','spacer','overflow_menu','fullscreen'],
                seekBarColors: { base: 'white', buffered: 'red', played: 'green' }
            });
            p.configure({ manifest: { defaultPresentationDelay: 5 }, streaming: { lowLatencyMode: true, bufferingGoal: 10, rebufferingGoal: 2, safeSeekOffset: 5 } });
            
            p.load(url).then(() => v.play().catch(()=>{})).catch(()=>{});
        }
    </script>
</body>
</html>
