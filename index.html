<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV One</title>
    
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css"/>
    <link rel="icon" type="image/png" sizes="16x16" href="https://i.postimg.cc/02hBbWKp/IP.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg: #fef2f2; --card: rgba(255,255,255,0.85); --border: rgba(220,38,38,0.2); 
            --red: #dc2626; --text: #1e293b; --muted: #64748b; 
        }        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }        
        body { background: radial-gradient(circle at top left, #fee2e2, #fef2f2); min-height: 100vh; color: var(--text); }        
        .app { max-width: 1400px; margin: 0 auto; padding: 0 1rem 1.5rem; }
        
        .header { 
            position: sticky; top: 0; z-index: 100; background: transparent; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 1.2rem 0; margin-bottom: 1.5rem; 
        }                
        .logo-area { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }        
        .logo-icon { width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; }        
        .logo-icon img { max-width: 100%; max-height: 100%; border-radius: 8px; object-fit: contain; }
        .actions { display: flex; align-items: center; gap: 10px; justify-content: flex-end; }
        
        .filter, .search { background: var(--card); border: 1px solid var(--border); border-radius: 16px; outline: none; transition: 0.3s; }        
        .filter:focus, .search:focus-within { border-color: var(--red); box-shadow: 0 0 8px rgba(220,38,38,0.2); }                
        .filter { 
            color: var(--text); padding: 0.5rem 2rem 0.5rem 1rem; cursor: pointer; appearance: none; 
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23dc2626' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e"); 
            background-repeat: no-repeat; background-position: right 10px center; background-size: 1em; max-width: 200px; text-overflow: ellipsis; white-space: nowrap; 
        }                
        .search { display: flex; align-items: center; padding: 0.5rem 1rem; width: 100%; max-width: 250px; }        
        .search input { background: transparent; border: none; outline: none; width: 100%; color: var(--text); padding-right: 10px; }        
        .search input::placeholder { color: var(--muted); }        
        .search i { color: var(--red); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1.2rem; }        
        .card { 
            background: var(--card); border-radius: 20px; padding: 1rem 0.5rem; border: 1px solid var(--border); 
            cursor: pointer; text-align: center; transition: 0.3s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
        }        
        .card:hover { transform: translateY(-4px); background: #fee2e2; border-color: rgba(220,38,38,0.4); box-shadow: 0 10px 20px -5px rgba(220,38,38,0.15); }        
        .card-logo { width: 80px; height: 80px; margin: 0 auto 10px; background: lightgrey; border-radius: 18px; padding: 8px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }        
        .card-logo img { max-width: 100%; max-height: 100%; border-radius: 12px; object-fit: contain; }        
        .card-name { font-weight: 600; font-size: 0.85rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }        
        .empty { grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--muted); }
        
        @media (max-width: 650px) {            
            .app { padding: 0 0.5rem 1.5rem; }            
            .header { padding: 1rem 0; width: 100%; }            
            .logo-icon { width: 70px; height: 70px; }            
            .actions { gap: 6px; }            
            .filter { padding: 0.4rem 1.6rem 0.4rem 0.6rem; font-size: 0.8rem; max-width: 110px; background-position: right 6px center; background-size: 0.8em; border-radius: 12px; }            
            .search { padding: 0.4rem 0.8rem; border-radius: 12px; max-width: 140px; }            
            .search input { font-size: 0.85rem; }            
            .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }            
            .card-logo { width: 60px; height: 60px; }        
        }

        .loader { text-align: center; font-size: 1.2em; margin-top: 50px; font-weight: bold; color: var(--muted); }
        #player-view { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        .shaka-video-container { width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <div id="grid-view" class="app">
        <header class="header">
            <div class="logo-area">
                <div class="logo-icon"><img src="https://i.postimg.cc/bvcWFCz1/iptv.png" alt="Logo"></div>
            </div>
            <div class="actions">
                <select id="categoryDropdown" class="filter"></select>
                <div class="search">
                    <input type="text" id="searchInput" placeholder="Search...">
                    <i class="fas fa-search"></i>
                </div>
            </div>
        </header>
        <div id="loading" class="loader">Loading channels...</div>
        <div class="grid" id="channelGrid"></div>
    </div>
    
    <div id="player-view">
        <div class="shaka-video-container" id="player-container">
            <video id="video" autoplay muted playsinline preload="metadata"></video>
        </div>
    </div>

    <script>
        let allChannels = []; 
        const streamUrl = new URLSearchParams(window.location.search).get('url');

        if (streamUrl) {
            document.getElementById('grid-view').style.display = 'none';
            document.getElementById('player-view').style.display = 'block';
            initPlayer(streamUrl);
        } else {
            initGrid();
        }

        async function initGrid() {
            try {
                const res = await fetch('https://iptv-org.github.io/iptv/languages/hin.m3u');
                const data = await res.text();
                
                let curr = {};
                data.split('\n').forEach(line => {
                    line = line.trim();
                    if (line.startsWith('#EXTINF:')) {
                        curr.logo = (line.match(/tvg-logo="([^"]+)"/) || [])[1] || 'https://via.placeholder.com/80x80.png?text=No+Logo';
                        curr.group = (line.match(/group-title="([^"]+)"/) || [])[1] || 'Other';
                        curr.name = line.split(',').pop().trim() || 'Unknown';
                    } else if (line.startsWith('http')) {
                        if (line.startsWith('https://')) {
                            allChannels.push({...curr, url: line});
                        }
                        curr = {}; 
                    }
                });

                document.getElementById('loading').style.display = 'none';
                
                const dd = document.getElementById('categoryDropdown');
                const counts = { 'All Categories': allChannels.length };
                allChannels.forEach(c => counts[c.group] = (counts[c.group] || 0) + 1);
                
                ['All Categories', ...Object.keys(counts).filter(k => k !== 'All Categories').sort()].forEach(cat => {
                    dd.appendChild(new Option(`${cat} (${counts[cat]})`, cat));
                });

                filterChannels();
                dd.addEventListener('change', filterChannels);
                document.getElementById('searchInput').addEventListener('input', filterChannels);
            } catch {
                document.getElementById('loading').innerText = 'Error loading playlist.';
            }
        }

        function filterChannels() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.getElementById('categoryDropdown').value;
            const grid = document.getElementById('channelGrid');
            grid.innerHTML = ''; 
            
            const filtered = allChannels.filter(c => (cat === 'All Categories' || c.group === cat) && c.name.toLowerCase().includes(term));
            
            if (!filtered.length) return grid.innerHTML = '<div class="empty">No channels found.</div>';

            filtered.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-logo">
                        <img src="${c.logo}" alt="${c.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/80x80.png?text=No+Logo'">
                    </div>
                    <div class="card-name">${c.name}</div>
                `;
                card.onclick = () => window.open(window.location.pathname + '?url=' + encodeURIComponent(c.url), '_blank');
                grid.appendChild(card);
            });
        }

        async function initPlayer(url) {
            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) return alert("Browser not supported!");
            
            const video = document.getElementById("video");
            const container = document.getElementById("player-container");
            
            const player = new shaka.Player();
            await player.attach(video);
            
            const ui = new shaka.ui.Overlay(player, container, video);
            
            ui.configure({
                addSeekBar: false,
                controlPanelElements: ['play_pause_buffering', 'mute_volume', 'spacer', 'overflow_menu', 'fullscreen'],
                overflowMenuButtons: ['quality', 'captions', 'language', 'picture_in_picture']
            });
            
            player.configure({ 
                manifest: { defaultPresentationDelay: 5 }, 
                streaming: { lowLatencyMode: true, bufferingGoal: 10, rebufferingGoal: 2, safeSeekOffset: 5 } 
            });
            
            try {
                await player.load(url);
                video.play().catch(() => {});
            } catch (e) {
                console.error("Error loading stream", e);
            }
        }
    </script>
</body>
</html>
